# Opens (or updates) a "Weekend review" GitHub issue every Saturday morning
# with the top-6 problems the SM-2 scheduler has surfaced for this weekend.
#
# The issue body is generated by Tracking/scripts/queue_issue.py from
# Tracking/data/state.json — no external services, no secrets beyond the
# built-in GITHUB_TOKEN.
#
# Trigger:
#   * Saturday 02:30 UTC (= 08:00 IST)
#   * Manual: workflow_dispatch (useful for testing)
#
name: Weekly review nudge

on:
  schedule:
    - cron: "30 2 * * 6"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-review-nudge
  cancel-in-progress: false

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create review-queue --color "0e8a16" --description "Weekly review queue" 2>/dev/null || true
          gh label create study-log    --color "5319e7" --description "Study log"           2>/dev/null || true

      - name: Sync state (self-heal)
        run: python Tracking/scripts/sync.py

      - name: Generate issue title + body
        id: gen
        run: |
          TITLE="$(python Tracking/scripts/queue_issue.py --title-only)"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          python Tracking/scripts/queue_issue.py > /tmp/body.md
          echo "wrote /tmp/body.md ($(wc -l </tmp/body.md) lines)"

      - name: Create or update this week's issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.gen.outputs.title }}
        run: |
          set -e
          EXISTING=$(gh issue list \
            --label review-queue \
            --state open \
            --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" \
            | head -n 1)

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #$EXISTING"
            gh issue edit "$EXISTING" --body-file /tmp/body.md
          else
            echo "Creating new issue"
            gh issue create \
              --title "$TITLE" \
              --body-file /tmp/body.md \
              --label review-queue
          fi

      - name: Close prior open review-queue issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_TITLE: ${{ steps.gen.outputs.title }}
        run: |
          gh issue list \
            --label review-queue \
            --state open \
            --json number,title \
            --jq ".[] | select(.title != \"$KEEP_TITLE\") | .number" \
          | while read -r n; do
              [ -n "$n" ] && gh issue close "$n" \
                --comment "Superseded by this week's review issue."
            done
